name: Artifact Sharing

on:
  workflow_dispatch:

jobs:
  create-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Create report files
        run: echo "Build completed at $(date)" > report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: report.txt

  read-artifact:
    runs-on: ubuntu-latest
    needs: create-artifact
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-report

      - name: Read and print file
        run: cat report.txt
