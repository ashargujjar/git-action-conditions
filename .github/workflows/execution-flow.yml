name: download artifacts
on: workflow_dispatch

jobs:
  jobA:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v4
      - name: Create Report File
        run: echo "Build completed at $(date)" > report.txt
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: report.txt

  jobB:
    needs: jobA
    runs-on: ubuntu-latest
    steps:
      # Fixed: Changed version from v5 to v4 to match jobA
      - name: get artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-report

      # Fixed: Use 'cat' instead of 'ls' to print the actual content
      - name: output content
        run: cat report.txt
