name: Run the wokrflow

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        node-version: [18, 20]
    runs-on: ubuntu-latest

    steps:
      - name: get code

        uses: actions/checkout@v6

      - name: install node

        uses: actions/setup-node@v5

        with:
          node-version: ${{matrix.node-version}}

      - name: install depedencies

        run: npm install

      - name: build

        run: npm run build

      - name: Check Node version
        run: node --version
